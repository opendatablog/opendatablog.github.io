# Site settings
site: Open Data Blog
title: Open Data Blog
keywords: opendata,open data,open,data,opendatablog,open data blog, datablog,data blog,dataset, open dataset
description: A blog on open data, datasets, data science, statistcs, artificial intelligence and trends in technology. This blog is completely open source and built on top of open source technologies.
lang: en-US
timezone:  Europe/London
repo: https://github.com/opendatablog/opendatablog.github.io # site repo [optional]
google_verify:      QBMeWjI8s7WMKram8emRetfOXiP9PfRtE3pxKoEocFg # Put your Google Verification here
google_analytics:   G-2Z3TH1QNPJ # Put your Google Analytics code
google_adsense: ca-pub-8547389836635390  # Put your Google Adsense code
discus-identifier: open-data-blog

# Author settings
author:
  name: Open Data Blog
  bio: Technology Blog <br>Data Science, AI & Stats<br>Purely Open Source 
  desc: A blog on open data, datasets, data science, statistcs, artificial intelligence and trends in technology. This blog is completely open source and built on top of open source technologies.
  picture: assets/images/favicon.png
  github: opendatablog # github username
  twitter: opendata_blog
  facebook: # facebook username
  instagram: opendata_blog
  youtube:  # youtube username
  linkedin: # linkedin username
  email: mail.opendatablog@gmail.com # email adress


# URL settings
url: "https://www.opendata.blog" # Domain Name of host. [username].github.io for github pages
permalink: pretty

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge


exclude:
  - .jekyll-cache
  - .obsidian
  - Gemfile
  - Gemfile.lock
  - LICENSE.md
  - README.md
  - CONTRIBUTING.md

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-relative-links
  - jekyll-seo-tag
paginate: 20
paginate_path: "/page/:num"

collections:
  pages:
    output: true
    permalink: /:name
  posts:
    output: true
    permalink: /:slug
  
defaults:
  -
    scope:
      path: ""
    values:
      layout: "default"
  -
    scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
  -
    scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

relative_links:
  enabled:     true
  collections: false
